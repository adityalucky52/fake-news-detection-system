name: Deploy to EC2 (Without Docker)

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 using SSH
        uses: appleboy/ssh-action@v1.0.3
        env:
          ENV_FILE: ${{ secrets.ENV_FILE }}
          ML_SERVICE_URL: ${{ secrets.ML_SERVICE_URL }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          envs: ENV_FILE,ML_SERVICE_URL
          script: |
            # 1. Navigate to your project directory (Adjust the path if needed)
            # Assuming you cloned the project into the home directory: ~/fake-news-detection-system
            cd ~/fake-news-detection-system

            # 2. Pull the latest code from the main branch
            git fetch origin
            git reset --hard origin/main
            
            # 2.5 Create Backend .env securely
            echo "$ENV_FILE" > backend/.env
            echo "ML_SERVICE_URL=$ML_SERVICE_URL" >> backend/.env

            # 3. Setup Backend
            echo "--- Deploying Backend ---"
            cd backend
            npm install --include=dev
            npx prisma generate
            npm run build
            
            # Restart backend using PM2
            # (If it's the first time, pm2 start will run, otherwise pm2 restart)
            pm2 restart backend-api --update-env || pm2 start dist/server.js --name backend-api
            
            # Navigate back to root
            cd ..

            # 4. Setup Frontend
            echo "--- Deploying Frontend ---"
            cd frontend
            npm install --include=dev
            npm run build
            
            # The built frontend will now be in ~/fake-news-detection-system/frontend/dist
            
            # 4.5 Move Frontend to Web Server Directory
            echo "--- Exposing Frontend ---"
            sudo rm -rf /var/www/fake-news-detection-system
            sudo mkdir -p /var/www/fake-news-detection-system
            sudo cp -r ~/fake-news-detection-system/frontend/dist/* /var/www/fake-news-detection-system/
            sudo chown -R www-data:www-data /var/www/fake-news-detection-system
            
            # 5. Update Nginx Configuration
            echo "--- Updating Nginx Configuration ---"
            cd ~/fake-news-detection-system
            sudo cp nginx.conf /etc/nginx/sites-available/default
            sudo nginx -t
            sudo systemctl restart nginx
            
            echo "--- Deployment Complete ---"
