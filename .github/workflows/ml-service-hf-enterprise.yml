name: Deploy ML Service to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - 'ml-service/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hugging Face
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Isolate ML Service Directory
        run: |
          mkdir -p hf-deploy
          cp -r ml-service/* hf-deploy/

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          cd hf-deploy
          git init
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git remote add space https://$HF_USERNAME:$HF_TOKEN@huggingface.co/spaces/$HF_USERNAME/$HF_SPACE_NAME
          git add .
          git commit -m "Deploy from GitHub Actions"
          git push -f space main
