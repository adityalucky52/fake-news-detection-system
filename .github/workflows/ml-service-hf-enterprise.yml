name: Deploy ML Service to Hugging Face

on:
  push:
    branches:
      - main
    paths:
      - 'ml-service/**'
  workflow_dispatch:

jobs:
  deploy:
    name: Deploy to Hugging Face
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Isolate ML Service Directory
        run: |
          mkdir -p hf-deploy
          cp -r ml-service/* hf-deploy/

      - name: Push to Hugging Face Space
        env:
          HF_TOKEN: ${{ secrets.HF_TOKEN }}
          HF_USERNAME: ${{ secrets.HF_USERNAME }}
          HF_SPACE_NAME: ${{ secrets.HF_SPACE_NAME }}
        run: |
          # Strip any invisible newlines or carriage returns from the secrets
          CLN_TOKEN=$(echo -n "$HF_TOKEN" | tr -d '\n\r')
          CLN_USER=$(echo -n "$HF_USERNAME" | tr -d '\n\r')
          CLN_SPACE=$(echo -n "$HF_SPACE_NAME" | tr -d '\n\r')
          
          cd hf-deploy
          git init -b main
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          
          # Use the cleaned variables
          REMOTE_URL="https://${CLN_USER}:${CLN_TOKEN}@huggingface.co/spaces/${CLN_USER}/${CLN_SPACE}"
          git remote add space "$REMOTE_URL"
          git add .
          git commit -m "Deploy from GitHub Actions"
          git push -f space main
