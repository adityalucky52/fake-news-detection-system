name: Backend Deploy (ECR -> EC2)

on:
  push:
    branches: [main]
    paths:
      - backend/**
      - deploy/docker-compose.ec2.yml
      - .github/workflows/backend-ec2.yml
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: ${{ secrets.AWS_REGION }}

      - name: Login to ECR
        id: login-ecr
        uses: aws-actions/amazon-ecr-login@v2

      - name: Build and push backend image
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
        run: |
          docker build -t $ECR_REGISTRY/$ECR_BACKEND_REPO:latest ./backend
          docker push $ECR_REGISTRY/$ECR_BACKEND_REPO:latest

      - name: Deploy on EC2
        uses: appleboy/ssh-action@v1.2.0
        env:
          ECR_REGISTRY: ${{ steps.login-ecr.outputs.registry }}
          ECR_BACKEND_REPO: ${{ secrets.ECR_BACKEND_REPO }}
          ECR_ML_REPO: ${{ secrets.ECR_ML_REPO }}
          AWS_REGION: ${{ secrets.AWS_REGION }}
          APP_DIR: ${{ secrets.EC2_APP_DIR }}
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_PRIVATE_KEY }}
          envs: ECR_REGISTRY,ECR_BACKEND_REPO,ECR_ML_REPO,AWS_REGION,APP_DIR
          script: |
            set -e
            cd "$APP_DIR"

            aws ecr get-login-password --region "$AWS_REGION" | docker login --username AWS --password-stdin "$ECR_REGISTRY"

            export ECR_REGISTRY="$ECR_REGISTRY"
            export ECR_BACKEND_REPO="$ECR_BACKEND_REPO"
            export ECR_ML_REPO="$ECR_ML_REPO"

            docker compose -f deploy/docker-compose.ec2.yml pull
            docker compose -f deploy/docker-compose.ec2.yml up -d --remove-orphans
            docker image prune -f
