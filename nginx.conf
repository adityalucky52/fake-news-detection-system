server {
    listen 80;
    server_name truthlens.adityalucky.online www.truthlens.adityalucky.online;

    # Serve the React/Vite Frontend from the 'dist' folder
    location / {
        root /var/www/fake-news-detection-system;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Crucial for single-page applications (React Router)
    }

    # Proxy API requests to the backend PM2 server (running on port 5000)
    location /api/ {
        proxy_pass http://localhost:5000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $http_host;
        
        # VERY IMPORTANT for Rate Limiting / trust proxy to work when using Cloudflare!
        proxy_set_header X-Real-IP $http_cf_connecting_ip;  # Use Cloudflare's special IP header
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        proxy_cache_bypass $http_upgrade;
    }
}
