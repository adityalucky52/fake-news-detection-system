server {
    listen 80;
    server_name _; # You can replace this with your domain name later (e.g., fakenews.com)

    # Serve the React/Vite Frontend from the 'dist' folder
    location / {
        root /home/ubuntu/fake-news-detection-system/frontend/dist;
        index index.html index.htm;
        try_files $uri $uri/ /index.html; # Crucial for single-page applications (React Router)
    }

    # Proxy API requests to the backend PM2 server (running on port 5000)
    location /api/ {
        proxy_pass http://localhost:5000/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
    }
}
